name: Refresh data

on:
  schedule:
    # Hourly. Most upstream sources (CDC, WHO, Argentina BEN) update at most
    # weekly, but ArcGIS line-list and GDELT news both refresh continuously
    # during active outbreaks — hourly captures those.
    - cron: "0 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      # Opt into Node.js 24 for GitHub-hosted Actions runners ahead of the
      # June 16 2026 forced migration (Node.js 20 is removed Sep 16 2026).
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install pdftotext (poppler-utils)
        run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - name: Fetch latest data
        run: node scripts/fetch-data.mjs
      - name: Commit if changed
        id: commit
        run: |
          if git diff --quiet -- public/data.json; then
            echo "No data changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data.json
          git commit -m "chore: refresh data $(date -u +%Y-%m-%d)"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      # Belt-and-suspenders: even if the git push doesn't trigger a Vercel
      # rebuild for some reason, the deploy hook forces one. Skips quietly
      # when the secret isn't configured.
      - name: Trigger Vercel rebuild
        if: steps.commit.outputs.changed == 'true'
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK" ]; then
            echo "VERCEL_DEPLOY_HOOK not set; skipping."
            exit 0
          fi
          curl -fsSL -X POST "$VERCEL_DEPLOY_HOOK" -o /dev/null -w "vercel hook: HTTP %{http_code}\n"
