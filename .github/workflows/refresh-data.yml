name: Refresh data

on:
  schedule:
    # Daily at 07:00 UTC — runs after CDC's typical Thursday-night NNDSS push.
    - cron: "0 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Fetch latest data
        run: node scripts/fetch-data.mjs
      - name: Commit if changed
        id: commit
        run: |
          if git diff --quiet -- public/data.json; then
            echo "No data changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data.json
          git commit -m "chore: refresh data $(date -u +%Y-%m-%d)"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      # Belt-and-suspenders: even if the git push doesn't trigger a Vercel
      # rebuild for some reason, the deploy hook forces one.
      - name: Trigger Vercel rebuild
        if: steps.commit.outputs.changed == 'true' && env.VERCEL_DEPLOY_HOOK != ''
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: curl -fsSL -X POST "$VERCEL_DEPLOY_HOOK" -o /dev/null -w "vercel hook: HTTP %{http_code}\n"
